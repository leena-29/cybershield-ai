<!DOCTYPE html>
<html>
<head>
<title>Cyber Password Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* 🔥 BACKGROUND */
body{
height:100vh;
background:
linear-gradient(rgba(5,10,25,0.85),rgba(5,10,25,0.95)),
url("https://images.unsplash.com/photo-1537432376769-00a3d2a7b3f3");
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* GLASS CARD */
.card{
width:430px;
padding:35px;
border-radius:20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 60px rgba(0,0,0,0.7);
text-align:center;
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-top:10px;
background:#e5e7eb;
}

/* BUTTON */
button{
margin-top:12px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#3b82f6,#06b6d4);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* SMALL BUTTONS */
.row{
display:flex;
gap:10px;
margin-top:10px;
}

.row button{
font-size:13px;
}

/* GRAPH */
.circle{
width:140px;
height:140px;
border-radius:50%;
margin:20px auto;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
background: conic-gradient(red 0%, #1e293b 0%);
}

/* BAR */
.bar{
height:8px;
width:100%;
background:#1e293b;
border-radius:10px;
margin-top:10px;
}

.bar-fill{
height:8px;
width:0%;
border-radius:10px;
background:red;
transition:0.5s;
}

/* TEXT */
.result{margin-top:8px;font-size:18px;}
.info{font-size:13px;color:#cbd5f5;margin-top:3px;}

/* RULES */
.rules{text-align:left;margin-top:10px;}
.rules li{margin:4px 0;}

/* SUGGESTION */
.suggestion{
margin-top:10px;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
font-size:13px;
}

/* 🔥 ADVANCED POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter: blur(8px);
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
background: rgba(20,30,50,0.9);
padding:25px;
border-radius:15px;
width:320px;
text-align:center;
border:1px solid rgba(255,255,255,0.2);
box-shadow:
0 0 20px rgba(59,130,246,0.4),
0 0 40px rgba(6,182,212,0.2);
animation:popupIn 0.4s ease;
}

@keyframes popupIn{
from{transform:scale(0.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.popup-close{
position:absolute;
top:15px;
right:20px;
cursor:pointer;
font-size:18px;
color:#ff4d6d;
}

.gen-text{
margin:15px 0;
padding:10px;
background:#111827;
border-radius:8px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="card">

<h2>Password Analyzer</h2>

<input type="password" id="password" placeholder="Enter password">

<button onclick="checkPassword()">Analyze Password</button>

<div class="row">
<button onclick="openGuide()">📘 Guide</button>
<button onclick="openGenerator()">⚡ Generate</button>
</div>

<div class="circle" id="circle">0%</div>

<div class="bar">
<div class="bar-fill" id="bar"></div>
</div>

<div class="result" id="result"></div>
<div class="info" id="time"></div>
<div class="info" id="entropy"></div>

<ul class="rules">
<li id="r1">❌ 8+ characters</li>
<li id="r2">❌ Uppercase</li>
<li id="r3">❌ Number</li>
<li id="r4">❌ Special symbol</li>
</ul>

<div class="suggestion" id="suggestion"></div>

</div>

<!-- GUIDE POPUP -->
<div class="popup" id="guidePopup">
<div class="popup-box">
<span class="popup-close" onclick="closeGuide()">✖</span>
<h3>🔐 Strong Password Guide</h3>
<p style="margin-top:10px;font-size:14px;">
✔ Use 12+ characters <br>
✔ Mix A-Z, a-z <br>
✔ Add numbers & symbols <br>
✔ Avoid common passwords <br>
✔ Don’t reuse passwords
</p>
</div>
</div>

<!-- GENERATOR POPUP -->
<div class="popup" id="genPopup">
<div class="popup-box">
<span class="popup-close" onclick="closeGen()">✖</span>
<h3>⚡ Smart Password</h3>
<div class="gen-text" id="genPass"></div>
<button onclick="generate()">Generate Again</button>
</div>
</div>

<script>

/* ENTER KEY */
document.getElementById("password").addEventListener("keypress",function(e){
if(e.key==="Enter") checkPassword();
});

function checkPassword(){

let pass=document.getElementById("password").value;
let score=0;
let suggestions=[];

/* RESET */
document.getElementById("r1").innerHTML="❌ 8+ characters";
document.getElementById("r2").innerHTML="❌ Uppercase";
document.getElementById("r3").innerHTML="❌ Number";
document.getElementById("r4").innerHTML="❌ Special symbol";

/* COMMON PASSWORD */
let common=["123456","password","admin","qwerty"];
if(common.includes(pass)){
document.getElementById("result").innerHTML="❌ Very Weak (Common Password)";
return;
}

/* RULES */
if(pass.length>=8){score+=25;document.getElementById("r1").innerHTML="✅ 8+ characters";}
else suggestions.push("Use 8+ characters");

if(/[A-Z]/.test(pass)){score+=25;document.getElementById("r2").innerHTML="✅ Uppercase";}
else suggestions.push("Add uppercase");

if(/[0-9]/.test(pass)){score+=25;document.getElementById("r3").innerHTML="✅ Number";}
else suggestions.push("Add number");

if(/[!@#$%^&*]/.test(pass)){score+=25;document.getElementById("r4").innerHTML="✅ Special symbol";}
else suggestions.push("Add special symbol");

/* GRAPH */
document.getElementById("circle").innerHTML=score+"%";

let color="red";
if(score>50) color="orange";
if(score>75) color="lime";

document.getElementById("circle").style.background=
`conic-gradient(${color} ${score}%, #1e293b ${score}%)`;

/* BAR */
document.getElementById("bar").style.width=score+"%";
document.getElementById("bar").style.background=color;

/* RESULT */
if(score<50) document.getElementById("result").innerHTML="❌ Weak Password";
else if(score<75) document.getElementById("result").innerHTML="⚠️ Medium Password";
else document.getElementById("result").innerHTML="✅ Strong Password";

/* TIME TO CRACK */
let seconds=Math.pow(95,pass.length)/1e9;

let time="Instant";
if(seconds>60) time=Math.floor(seconds/60)+" minutes";
if(seconds>3600) time=Math.floor(seconds/3600)+" hours";
if(seconds>86400) time=Math.floor(seconds/86400)+" days";
if(seconds>31536000) time=Math.floor(seconds/31536000)+" years";

document.getElementById("time").innerHTML="⏳ Crack time: "+time;

/* ENTROPY */
let entropy=pass.length*Math.log2(95);
document.getElementById("entropy").innerHTML="🔐 Entropy: "+Math.floor(entropy)+" bits";

/* SUGGESTION */
if(suggestions.length>0)
document.getElementById("suggestion").innerHTML="💡 Improve: "+suggestions.join(", ");
else
document.getElementById("suggestion").innerHTML="🔥 Excellent password";

}

/* POPUPS */
function openGuide(){document.getElementById("guidePopup").style.display="flex";}
function closeGuide(){document.getElementById("guidePopup").style.display="none";}

function openGenerator(){
document.getElementById("genPopup").style.display="flex";
generate();
}
function closeGen(){document.getElementById("genPopup").style.display="none";}

function generate(){
let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
let pass="";
for(let i=0;i<14;i++){
pass+=chars[Math.floor(Math.random()*chars.length)];
}
document.getElementById("genPass").innerText=pass;
}

</script>

</body>
</html>
